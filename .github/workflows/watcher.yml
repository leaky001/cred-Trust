name: Default Watcher Automation

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

jobs:
  run-watcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Default Watcher
        env:
          NEXT_PUBLIC_LOAN_FACTORY_ADDRESS: ${{ secrets.NEXT_PUBLIC_LOAN_FACTORY_ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CREDITCOIN_TESTNET_RPC: "https://rpc.cc3-testnet.creditcoin.network"
        run: |
          node scripts/defaultWatcher.js
