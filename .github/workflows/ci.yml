name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Compile Contracts
      run: npm run compile

    - name: Run Contract Tests
      run: npm run test:contracts

    # Optional: linting or frontend build could be added here
    # - name: Build frontend
    #   run: npm run build
